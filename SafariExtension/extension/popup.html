<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 220px; margin: 0; padding: 14px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #1c1c1e; }
    h1 { font-size: 15px; margin: 0 0 4px; }
    p { color: #6b6b70; margin: 0 0 12px; font-size: 12px; }
    button { width: 100%; padding: 9px; border: 0; border-radius: 9px;
      background: #0a84ff; color: #fff; font-weight: 700; font-size: 14px; cursor: pointer; }
    label { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    select { border: 1px solid #d1d1d6; border-radius: 7px; padding: 4px; }
  </style>
</head>
<body>
  <h1>GestureScroll</h1>
  <p>이 페이지에서 손동작 제어를 켭니다. 우측 하단 패널에서도 조절할 수 있어요.</p>
  <button id="toggle">이 페이지에서 켜기 / 끄기</button>
  <label>모드
    <select id="mode">
      <option value="scroll">Scroll</option>
      <option value="keynote">Slides</option>
      <option value="pdf">PDF</option>
    </select>
  </label>
  <script src="popup.js"></script>
</body>
</html>
